apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: textile-ai
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: textile-ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: textile-ai/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: JWT_EXPIRES_IN
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: AI_SERVICE_URL
            - name: THROTTLE_TTL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: THROTTLE_TTL
            - name: THROTTLE_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: THROTTLE_LIMIT
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: api-uploads-pvc
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: textile-ai
data:
  JWT_EXPIRES_IN: "7d"
  AI_SERVICE_URL: "http://ai.textile-ai.svc.cluster.local:8000"
  THROTTLE_TTL: "60"
  THROTTLE_LIMIT: "100"
---
