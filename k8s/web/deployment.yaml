apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: textile-ai
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: textile-ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: textile-ai/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_AI_URL
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: NEXT_PUBLIC_AI_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: textile-ai
data:
  NEXT_PUBLIC_API_URL: "http://api.textile.local"
  NEXT_PUBLIC_AI_URL: "https://ai.textile.local"
