version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: textile-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: textile_ai
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d textile_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - textile-net

  redis:
    image: redis:7
    container_name: textile-ai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - textile-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: textile-ai/api:latest
    container_name: textile-ai-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/textile_ai
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - textile-net

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    image: textile-ai/ai:latest
    container_name: textile-ai-ai
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/textile_ai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/ai:/app
      - ai_models:/app/model_cache
    networks:
      - textile-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: textile-ai/web:latest
    container_name: textile-ai-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_AI_URL: ${NEXT_PUBLIC_AI_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
      - ai
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - textile-net

volumes:
  postgres_data:
  redis_data:
  ai_models:

networks:
  textile-net:
    driver: bridge
